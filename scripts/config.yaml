# python-lib-dev — harness configuration
# Default values. Interview may override thresholds per run via mode.json.overrides.
# caps are hard and not overridable by interview (only by editing this file).

caps:
  minor_loop: 3          # s5 MINOR -> s4
  major_loop: 2          # s5 MAJOR -> s2
  total_stages: 15       # cumulative stage invocations across the whole run

thresholds:
  line_coverage: 0.90
  branch_coverage: 0.80
  max_major_issues_new: 0
  max_major_issues_evolve: 2

stagnation:
  min_overlap_ratio: 0.5   # Jaccard overlap across recent verdict.issues_key sets triggering escalation
  window: 3                # number of consecutive verdicts inspected; 3 avoids tripping on a single repeated issue within the MINOR loop cap (=3)

review:
  sub_agents: []           # future: ["api-critic", "test-skeptic", "doc-reviewer"]

# Fixed tooling (uv / hatchling / pytest / mypy --strict / ruff / Google docstrings /
# Python 3.10 floor / Conventional Commits / 3.10-3.13 CI matrix) is the single-
# source-of-truth in `.claude/skills/python-library-conventions/SKILL.md`.
# It is intentionally NOT mirrored here — duplicating it would invite drift.
